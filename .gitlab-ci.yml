image: "$CI_REGISTRY_IMAGE/python:rc-slim-buster"

variables:
  TRIGGER_CACHE: "on"

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

stages:
  - tests

# génération des dépendances projet
create_env:
  # rendre le cache disponible dans 2 threads exécutés en parallèle
  # pour les jobs parallèles tests et e2e
  parallel: 2
  stage: .pre
  before_script:
    # création du dossier de dépendances "venv"
    - python3 -m venv venv
    # activation de l'environnement virtuel
    - source venv/bin/activate
  script:
    # installation des dépendances dans l'environnement virtuel
    - pip3 install -r requirements.txt
  cache:
    key: venv
    paths:
      - venv
    policy: push
  rules:
    # déclenchement auto
    - changes:
        - requirements.txt
    # déclenchement manuel
    - if: $TRIGGER_CACHE == "off"

test:
  # debug gitlab ci
  # variables:
  #   CI_DEBUG_TRACE: "true"
  stage: tests
  script:
    - source venv/bin/activate
    - coverage run --include="bank/*.py" --omit="**/tests/*.py,**/__init__.py" coverage_tests.py
    - coverage report
    - coverage xml -o reports/coverage.xml
  artifacts:
    expire_in: 1 hour
    reports:
      junit: "reports/TEST-*.xml"
      cobertura: reports/coverage.xml
  cache:
    key: venv
    untracked: true
    policy: pull

e2e:
  # serveur selenium à la demande
  services:
    - name: selenium/standalone-firefox:latest
      alias: gitlab_selenium_server
  stage: tests
  # rendre le driver acessible au client
  # ==> mise dans le PATH et driver exécutable
  before_script:
    - source venv/bin/activate
    - cp geckodriver /usr/bin/
    - chmod +x /usr/bin/geckodriver
  script:
    - python3 e2e_remote.py
  cache:
    key: venv
    untracked: true
    policy: pull
  


