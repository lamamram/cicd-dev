image: "$CI_REGISTRY_IMAGE/alpine-mono"

variables:
  TRIGGER_TEST: "on"

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

stages:
  - builds
  - tests
  - deploys

# ".cahce": job désactivé
# "&cache_deps": nom de l'objet YAML
.cache: &cache_deps
  key: deps
  # pour éviter un "git clean"
  untracked: true
  policy: pull

build:
  stage: builds
  script:
    # production d'un cache
    - mkdir dependencies
    - echo "dependency content" > dependencies/dependency
  # génération d'un cache
  cache:
    # ancre YAML: injection de l'alias + ajouts / modifications
    <<: *cache_deps
    paths:
      - dependencies/
    policy: push

test:
  stage: tests
  script:
    - cat dependencies/dependency
  # installation du cache "deps"
  # "*cache_deps" : alias de "&cache_deps"
  cache: *cache_deps

deploy:
  stage: deploys
  script:
    - cat dependencies/dependency
  # installation du cache "deps"
  cache: *cache_deps

  


