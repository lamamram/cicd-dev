image: "$CI_REGISTRY_IMAGE/alpine-mono"

# ordre d'exécution de groupes de jobs
stages:
  - builds
  - tests

test:
  stage: tests
  # test ne dépend que de build, il peut s'exécuter dès que
  # build a terminé indépendamment du stage builds
  needs: [build]
  script:
    - echo "Test"

test2:
  # dans le stage "tests" les jobs sont exécutés en parallèle
  stage: tests
  script:
    - echo "Test2"

build:
  stage: builds
  script:
    - xbuild build.csproj

build2:
  stage: builds
  script:
    - sleep 5
    - echo "Build"