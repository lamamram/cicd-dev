# { "test": { "tags": [], "script": [] } }
# test: valeur arbitraire
test:
  # image du job, qui écrase l'image par défaut du runner
  image: python:3.13-slim-bookworm
  # tags correspondant à un/plusieurs runner(s) donné(s)
  tags:
    - myusine
  script:
    - cd app
    - pip3 install -r requirements.txt
    - pip3 install -r requirements-dev.txt
    - pytest -v