# job
build:
  # le job contient un script == une liste de commandes
  script:
    # 3 commandes sur plusieurs lignes
    - |
      echo "Build "
      echo "En "
      echo "Cours !"

test:
  script:
    # une seule longue commande écrite sur plusieurs
    - >
      echo "Test en cours d'exécution sur un conteneur " 
      && echo "Docker piloté par gitlab-runner" 
# équivalent à 
# {
#   "test": {
#     "script": ["echo 'Test !'"]
#   }
# }
# {"test":{"script":["echo 'Test !'"]}}
