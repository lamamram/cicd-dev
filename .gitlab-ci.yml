# image par défaut du pipeline: utilisée par défaut pour les jobs
image: python:3.13-slim-bookworm

generate_deps:  
  tags:
    - myusine
  script:
    # création du dossier venv
    - python3 -m venv venv
    # activate
    - source ./venv/bin/activate
    # ajout des dépendances dans le dossier venv
    - pip3 install -r app/requirements.txt
    - pip3 install -r app/requirements-dev.txt
  cache:
    key: pip_deps
    paths:
      - venv
    # venv est à l'état "untracked" du point de vue git
    untracked: true
    # on utilise le cache ici pour uploader le dossier venv => push 
    policy: push

test:
  tags:
    - myusine
  script:
    - cd app
    - pytest -v
