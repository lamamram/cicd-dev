# règles globales du pipeline
# workflow:
#   rules:
#     - 

# image par défaut de tous le jobs
# image docker pour python
image: python:3.11.10-slim-bookworm

# étapes du pipeline dans l'ordre de la liste
stages:
  - init
  - testing
#   - quality


generate-deps:
  # YAML compatible JSON !
  stage: init
  tags: [myusine]
  script:
    # on installe l'environnement virtuel là où on est
    - python3 -m venv ./venv
    - source ./venv/bin/activate
    - pip3 install -r app/requirements.txt
    - pip3 install -r app/requirements-dev.txt
  # uploader le dossier ./venv dans la VM
  # ajout de variables d'environnement injectées dans tous le jobs
  variables:
    TRIGGER_CACHE: "on"
  cache:
    # nom du cache (volume docker)
    key: virtual-env 
    # localisation du dossier pour l'uploader
    paths:
      - ./venv
    policy: push
  # règles d'exécution
  # 1. chaque règle écrite autorise l'exécution du job (OU)
  # 2. TOUTES les clauses d'une règle doivent être vraie pour autoriser l'exécution du job (ET)  
  rules:
    # le job est exécuté si qqch change sur ces fichiers
    - changes: 
        - app/requirements.txt
        - app/requirements-dev.txt
    - if: $TRIGGER_CACHE == "on"
      # par défaut on_success: on exécute si les jobs précédents en succes
      # on_failure: on exécute si un job précédent et en erreur
      when: on_success

test:
  stage: testing
  tags:
    - myusine
  script:
    - source ./venv/bin/activate
    - cd app
    - pytest
  cache:
    key: virtual-env
    # gitlab-runner exécute 'git clean' APRES le cache
    # donc on utilise la clé untracked pour obliger gitlab-runner de laisser le cache !!!
    untracked: true
    policy: pull