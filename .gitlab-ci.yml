workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE != "merge_request_event"

image: python:3.11.10-slim-bookworm

stages:
  - init
  - testing
#   - quality


generate-deps:
  stage: init
  tags: [myusine]
  script:
    - python3 -m venv ./venv
    - source ./venv/bin/activate
    - pip3 install -r app/requirements.txt
    - pip3 install -r app/requirements-dev.txt
  variables:
    TRIGGER_CACHE: "on"
  cache:
    key: virtual-env 
    paths:
      - ./venv
    policy: push
  rules:
    - changes: 
        - app/requirements.txt
        - app/requirements-dev.txt
    - if: $TRIGGER_CACHE == "off"
      when: on_success

test:
  stage: testing
  tags:
    - myusine
  script:
    - source ./venv/bin/activate
    - cd app
    # ">" opérateur YAML qui convertie \n en " "
    - >
      pytest 
      --junit-xml=./units.xml 
      --cov=bank 
      --cov-report=term 
      --cov-report=xml:coverage.xml
  # détection de la couverture globale dans la sortie du job => rerpot=term / avec une regex
  coverage: "/^TOTAL.*?([0-9]{1,3})%/"
  cache:
    key: virtual-env
    untracked: true
    policy: pull
  artifacts:
    expire_in: "1 hour"
    paths:
      - ./app/units.xml
      - ./app/coverage.xml
    reports:
      junit: ./app/units.xml
      coverage_report:
        coverage_format: cobertura
        path: ./app/coverage.xml