image: "$CI_REGISTRY_IMAGE/alpine-mono"

variables:
  TRIGGER_TEST: "on"

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

stages:
  - builds
  - tests
  - deploys

build:
  stage: builds
  script:
    # production d'un cache
    - mkdir dependencies
    - echo "dependency content" > dependencies/dependency
  # génération d'un cache
  cache:
    key: deps
    paths:
      - dependencies/
    policy: push

test:
  stage: tests
  script:
    - cat dependencies/dependency
  # installation du cache "deps"
  cache:
    key: deps
    # pour éviter un "git clean"
    untracked: true
    policy: pull

  


