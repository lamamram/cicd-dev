image: python:3.13-slim-bookworm

stages:
  - dependencies
  - tests

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "web"

variables:
  TRIGGER_CACHE: "off"

generate_deps:
  stage: dependencies
  tags:
    - myusine
  script:
    - python3 -m venv venv
    - source ./venv/bin/activate
    - pip3 install -r app/requirements.txt
    - pip3 install -r app/requirements-dev.txt
  cache:
    key: pip_deps
    paths:
      - venv
    untracked: true
    policy: push
  rules:
    - changes:
        - app/requirements*.txt
      when: on_success
    - if: $TRIGGER_CACHE == "on"

test:
  stage: tests
  tags:
    - myusine
  script:
    - source ./venv/bin/activate
    - cd app
    - >
      pytest 
      -v
      --junit-xml=./units.xml
  cache:
    key: pip_deps
    untracked: true
    policy: pull
  artifacts:
    access: all
    expire_in: "1 hour"
    paths:
      - app/units.xml
    # clés spéciales liées à des rapports spéciaux aux formats attendus de GITLAB
    reports:
      # remonter le rapports dans l'interface graphique
      junit: app/units.xml
      

