image: python:3.13-slim-bookworm

stages:
  - dependencies
  - tests

### créer des environnements custom pour le pipelines ou dans le jobs
# uniquement string
variables:
  TRIGGER_CACHE: "off"

generate_deps:
  # variables locales
  # variables: ...
  # si des jobs parallèles utilisent le cache: copies du cache
  # parallel: 2
  stage: dependencies
  tags:
    - myusine
  script:
    - python3 -m venv venv
    - source ./venv/bin/activate
    - pip3 install -r app/requirements.txt
    - pip3 install -r app/requirements-dev.txt
  cache:
    key: pip_deps
    paths:
      - venv
    untracked: true
    policy: push
  # règles d'exécution du job
  # si une règle est vraie => le job est exécuté (OR)
  # une règles est vraue => si toutes ses clauses sont vraies (AND)
  rules:
    # 1ère règle: 2 clauses
    #  1/ si les dépendances changent
    #  2/ (pour l'exemple) si les jobs précédents sont en succès (comportement naturel du pipeline)
    - changes:
        - app/requirements*.txt
      when: on_success
    # 2ème règle : utilisant une variable d'environnement custom
    - if: $TRIGGER_CACHE == "on"

test:
  stage: tests
  tags:
    - myusine
  script:
    - source ./venv/bin/activate
    - cd app
    - pytest -v
  cache:
    key: pip_deps
    untracked: true
    policy: pull
