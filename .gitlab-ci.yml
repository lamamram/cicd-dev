image: "$CI_REGISTRY_IMAGE/python:rc-slim-buster"

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

stages:
  - tests

# génération des dépendances projet
create_env:
  stage: .pre
  before_script:
    # création du dossier de dépendances "venv"
    - python3 -m venv venv
    # activation de l'environnement virtuel
    - source venv/bin/activate
  script:
    # installation des dépendances dans l'environnement virtuel
    - pip3 install -r requirements.txt
  cache:
    key: venv
    paths:
      - venv
    policy: push

test:
  stage: tests
  script:
    - test -e venv
  cache:
    key: venv
    untracked: true
    policy: pull


  


