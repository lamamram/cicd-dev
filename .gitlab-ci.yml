image: "$CI_REGISTRY_IMAGE/alpine-mono"

variables:
  TRIGGER_TEST: "on"

# règles de déclenchement du pipeline
workflow:
  rules:
    # clause if: évalue une condition booléenne
    # les valeurs litérales sont des chaines de caractères
    # le pipeline s'executera si au moins une règle est vrai
    # OU logique
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

stages:
  - builds
  - tests
  - deploys

build:
  stage: builds
  script:
    # production d'un artefact
    - mkdir artifacts
    - echo "artifact content" > artifacts/artifact
  # prélèvement de l'artefact
  artifacts:
    expire_in: 1 hour
    paths:
      - artifacts/

test:
  stage: tests
  script:
    # disponibilité des artefacts dans les jobs aval
    - cat artifacts/artifact



